<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="btns">
        <button class="change-color-card-btn">Изменить цвет карточки</button>
        <button class="change-all-color-card-btn">Изменить цвет всех карточек</button>
        <button class="open-google">Открыть Google</button>
        <button class="change-colors-btn">Переключить цвета карточки</button>
    </div>
    
    <div class="products products--bg">
        <h1 class="products__title">Выбери свой продукт</h1>
        <ul class="products__list"></ul>
        <template class="products__template">
            <li class="product-card">
                <img src="" alt="" class="product-card__img">
                <span class="product-card__tag"></span>
                <h2 class="product-card__title"></h2>
                <p class="product-card__description"></p>
                <span class="product-card__subtitle">Состав: </span>
                <ul class="product-card__ingredients"></ul>
                <div class="product-card__price">
                    <span class="price__label">Цена</span>
                    <span class="price__value"></span>
                </div>
            </li>
        </template>
    </div>
    <script src="main.js"></script>
    <script src="homework-7.js"></script>
    <script src="homework-8.js"></script>
    <script src="homework-9.js" type="module"></script>
    <script src="homework-10.js" type="module"></script>
</body>
</html>
